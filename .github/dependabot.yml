# SCPN Quantum Control — Dependabot
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    # Temporary: both Braket pin owners require setuptools==81.0.0. The
    # fail-closed waiver audit requires removal when upstream admits >=83.0.0.
    ignore:
      - dependency-name: setuptools
  - package-ecosystem: pip
    directory: "/oscillatools"
    schedule:
      interval: weekly
      day: monday
  - package-ecosystem: cargo
    directory: "/scpn_quantum_engine"
    schedule:
      interval: weekly
      day: monday
