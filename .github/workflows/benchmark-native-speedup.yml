# SCPN Quantum Control — Native dense-Hamiltonian speedup benchmark + regression gate.
#
# Regenerates the Rust-vs-Qiskit dense XY-Hamiltonian construction benchmark on a
# fixed runner per agentic-shared/BENCHMARK_STANDARD.md, then runs the regression
# gate against the committed baseline in evidence-only mode: a GitHub-hosted
# runner's CPU differs from the declared-hardware baseline, so the latency
# comparison is collected and uploaded but does not block (the gate's
# hardware_mismatch guard flags it). workflow_dispatch is enabled so the evidence
# can be regenerated on demand; anyone can run scripts/benchmark_native_speedup.py
# locally and compare against the baseline the same way.

name: Native Speedup Benchmark

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/benchmark_native_speedup.py"
      - "tools/benchmark_native_speedup_gate.py"
      - "benchmarks/native_speedup_thresholds.toml"
      - "benchmarks/baselines/native_speedup.json"
      - "scpn_quantum_engine/**"
      - ".github/workflows/benchmark-native-speedup.yml"

permissions: {}

concurrency:
  group: native-speedup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-speedup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install package and dependencies
        run: |
          python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
          python -m pip install --no-deps -e .

      - name: Build and install the Rust engine
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          command: develop
          args: --release -m scpn_quantum_engine/Cargo.toml

      - name: Run the native speedup benchmark
        run: |
          python scripts/benchmark_native_speedup.py \
            --json-out artifacts/benchmarks/native_speedup_ci.json

      - name: Regression gate (evidence-only on hosted runner)
        run: |
          python tools/benchmark_native_speedup_gate.py \
            --report artifacts/benchmarks/native_speedup_ci.json \
            --baseline benchmarks/baselines/native_speedup.json \
            --json-out artifacts/benchmarks/native_speedup_verdict.json \
            --evidence-only

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-speedup-benchmark
          path: artifacts/benchmarks/
          retention-days: 90
