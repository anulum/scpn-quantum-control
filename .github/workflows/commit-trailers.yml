# SCPN Quantum Control — Commit-trailer auditor
name: Commit Trailer Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 05:00 UTC so any Dependabot merge that sneaks
    # through without Co-Authored-By is surfaced within 7 days.
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Need full history so v0.9.0..HEAD range resolves
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Run commit-trailer auditor
        run: python tools/check_commit_trailers.py --range v0.9.0..HEAD
