# SCPN Quantum Control — Publish
name: Publish to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r requirements-publish.txt
      - run: python -m build
      - name: Audit built wheel contents
        run: >-
          python tools/check_wheel_contents.py
          --project pyproject.toml
          'dist/*.whl'
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          attestations: true
      # Sign the sdist + wheels with Sigstore (Fulcio + Rekor,
      # OIDC-based keyless signing). `.sigstore` bundle files land
      # next to each artefact in `dist/`. PyPI respects
      # `attestations: true` and attaches the bundle server-side for
      # trusted-publisher flows.
      - uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46  # v3.0.1
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
