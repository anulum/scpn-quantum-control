# SCPN Quantum Control — Documentation link checker
name: Link Check

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/link-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - "docs/**"
      - "mkdocs.yml"
  schedule:
    # Weekly Monday 05:30 UTC — 30 min after the commit-trailer audit.
    # Broken external links drift on their own schedule (vendor URL
    # rearrangements, paper retractions); weekly re-scan surfaces them
    # without gating every PR.
    - cron: '30 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8  # v2.6.1
        with:
          # Scan every tracked markdown + html plus the built MkDocs
          # site if it's checked in. Skip .coordination/ (gitignored
          # anyway) and site/ (build artefacts).
          args: >-
            --verbose
            --no-progress
            --max-redirects 5
            --max-retries 3
            --retry-wait-time 5
            --timeout 20
            --accept 200,204,206,301,302,308,403,429,500,502,503
            --exclude-path .coordination
            --exclude-path site
            --exclude-path .venv-linux
            --exclude-path paper
            --exclude https://www.contributor-covenant.org
            --exclude https://doi.org/10.5281/zenodo.18821929
            --exclude https://ojs.aaai.org/index.php/AAAI-SS/article/view/36900
            --exclude https://www.seco.admin.ch/seco/de/home/Aussenwirtschaftspolitik_Wirtschaftliche_Zusammenarbeit/Wirtschaftsbeziehungen/exportkontrollen-und-sanktionen.html
            --exclude https://www.nature.com/articles/s41534-023-00681-0
            --exclude https://www.nature.com/articles/s41534-024-00866-1
            --exclude https://www.nature.com/articles/s41534-025-01118-6
            --exclude https://www.nature.com/articles/s41567-025-03090-6
            --exclude https://enzyme.mit.edu/
            './**/*.md'
          # 403/429/500/502/503 are accepted because many journals and
          # vendor pages return those for anonymous HEAD requests yet
          # work for human readers. A zero-false-positive rate matters
          # more than catching every deep dead link. `--max-retries 3`
          # with a 5 s backoff absorbs transient network errors
          # (`contributor-covenant.org` hit this on the 2026-04-17
          # 06:44 UTC run); a hard-dead URL still fails after the
          # retries so the gate remains meaningful.
          fail: true
      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd  # v5.0.1
        with:
          title: "Link Check — broken links on main"
          content-filepath: ./lychee/out.md
          labels: documentation, ci
