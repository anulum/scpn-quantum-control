# SCPN Quantum Control — isolated provider SDK smoke lanes
name: Provider Isolated Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provider-isolated-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  isolated-provider-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - extra: dwave
            backend: dwave_leap
            sdk_package: dwave-cloud-client
            venv_path: .venv-provider-dwave
          - extra: iqm
            backend: iqm_cloud
            sdk_package: iqm-client
            venv_path: .venv-provider-iqm
          - extra: quera
            backend: quera_bloqade
            sdk_package: bloqade
            venv_path: .venv-provider-quera
          - extra: strangeworks
            backend: strangeworks_compute
            sdk_package: strangeworks
            venv_path: .venv-provider-strangeworks
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Create isolated provider environment
        run: python -m venv "${{ matrix.venv_path }}"
      - name: Install isolated provider extra
        run: |
          "${{ matrix.venv_path }}/bin/python" -m pip install -U pip
          "${{ matrix.venv_path }}/bin/python" -m pip install --no-deps -e oscillatools/
          "${{ matrix.venv_path }}/bin/python" -m pip install -e ".[${{ matrix.extra }}]"
      - name: Run offline provider smoke gate
        run: >-
          "${{ matrix.venv_path }}/bin/scpn-provider-smoke"
          --format table
          --backend "${{ matrix.backend }}"
          --sdk-package "${{ matrix.sdk_package }}"
          --require-all
