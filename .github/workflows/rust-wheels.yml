# SCPN Quantum Control — Rust Engine Wheel Build + Publish
name: Rust Wheels

on:
  push:
    tags: ["engine-v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-wheels:
    strategy:
      # One platform's failure must not cancel the others' wheels.
      fail-fast: false
      matrix:
        include:
          # Linux builds run inside the manylinux container where the host
          # setup-python interpreter is invisible — name the container's
          # CPython explicitly or maturin finds no interpreter at all.
          - os: ubuntu-latest
            target: x86_64
            interpreter-args: "-i python3.12"
          - os: ubuntu-latest
            target: aarch64
            interpreter-args: "-i python3.12"
          - os: windows-latest
            target: x64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist ${{ matrix.interpreter-args }} -m scpn_quantum_engine/Cargo.toml
          manylinux: auto

      - name: Audit built wheel contents
        run: >-
          python tools/check_wheel_contents.py
          --project scpn_quantum_engine/pyproject.toml
          --package scpn_quantum_engine
          --extension scpn_quantum_engine.scpn_quantum_engine
          'dist/*.whl'

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          command: sdist
          args: -m scpn_quantum_engine/Cargo.toml --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/engine-v')
    environment: pypi
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Audit downloaded wheel contents
        run: >-
          python tools/check_wheel_contents.py
          --project scpn_quantum_engine/pyproject.toml
          --package scpn_quantum_engine
          --extension scpn_quantum_engine.scpn_quantum_engine
          'dist/*.whl'

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
        with:
          packages-dir: dist/
