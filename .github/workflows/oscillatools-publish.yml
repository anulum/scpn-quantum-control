# oscillatools — Publish
name: Publish oscillatools to PyPI

# The standalone oscillatools distribution publishes on its own dual tag
# (`oscillatools-v*`), mirroring the parent's `publish.yml` (`v*`) and the Rust
# engine's `engine-v*`, so the three distributions in this repository release
# independently. Trusted publishing (PyPI OIDC) plus Sigstore attestations are
# identical to the parent; PyPI must carry a trusted-publisher entry for the
# `oscillatools` project pointing at this workflow. The action pins mirror the
# already-verified pins in `publish.yml`.
on:
  push:
    tags: ["oscillatools-v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r requirements-publish.txt
      - run: python -m build oscillatools/
      - name: Audit built wheel contents
        run: >-
          python tools/check_wheel_contents.py
          --project oscillatools/pyproject.toml
          'oscillatools/dist/*.whl'
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
        with:
          attestations: true
          packages-dir: oscillatools/dist
      # Sign the sdist + wheels with Sigstore (Fulcio + Rekor, OIDC keyless).
      # `.sigstore` bundles land next to each artefact in `oscillatools/dist/`.
      - uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46  # v3.0.1
        with:
          inputs: >-
            ./oscillatools/dist/*.tar.gz
            ./oscillatools/dist/*.whl
