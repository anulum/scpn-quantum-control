# oscillatools — CI (standalone Kuramoto toolkit distribution)
name: oscillatools CI

# The standalone `oscillatools/` distribution carries its own lint, type, and
# test gate, separate from the parent scpn-quantum-control suite. It runs only
# when the distribution (or this workflow) changes so unrelated parent commits
# do not pay for it.
on:
  push:
    branches: [main]
    paths:
      - "oscillatools/**"
      - ".github/workflows/oscillatools-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "oscillatools/**"
      - ".github/workflows/oscillatools-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oscillatools-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: oscillatools

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests tools examples
      - run: ruff format --check src tests tools examples

  type-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install -e ".[dev]"
      # The Rust engine, JAX, Torch, Julia, and matplotlib tiers are optional
      # extras guarded at call sites; the mypy overrides in pyproject treat them
      # as untyped, so the numpy+scipy floor type-checks the whole surface. The
      # docs renderers (tools/) and the worked example are shipped code, so they
      # type-check under the same strict gate.
      - run: mypy --strict src/oscillatools/ tools examples

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      # [sklearn] and [viz] light up the scikit-learn estimator and matplotlib
      # renderer modules so they are exercised on the pinned numpy+scipy floor;
      # the [jax]/[torch]/[julia] tiers stay optional and their modules are
      # omitted from coverage (see [tool.coverage] in pyproject).
      - run: python -m pip install -e ".[dev,sklearn,viz]"
      - name: Run tests
        if: matrix.python-version != '3.12'
        run: pytest tests -q
      - name: Run tests with coverage (3.12)
        if: matrix.python-version == '3.12'
        run: pytest tests --cov=oscillatools --cov-report=term-missing --cov-fail-under=100

  docs-build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
          cache: 'pip'
      # The site uses only the search plugin (no mkdocstrings autodoc directives),
      # so the strict build validates the handbook, capability, tier, and
      # competitive pages and their cross-links without importing the package.
      - run: python -m pip install -e ".[docs]"
      - run: mkdocs build --strict

  oscillatools-ci-gate:
    needs: [lint, type-check, test, docs-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        # This job runs no checkout, so override the workflow-level
        # `oscillatools` working directory (which would not exist here) with the
        # always-present workspace root.
        working-directory: ${{ github.workspace }}
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.docs-build.result }}" != "success" ]]; then
            echo "oscillatools CI gate failed"
            exit 1
          fi
          echo "oscillatools CI gate passed"
