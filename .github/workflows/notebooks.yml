# SCPN Quantum Control — Notebook CI
#
# Runs the 13 core tutorial notebooks (notebooks/01..13) through
# `pytest-nbmake` so they stay executable. BLOCKING since 2026-07-16:
# promoted from `continue-on-error: true` after three consecutive
# genuinely green scheduled execute jobs (the staged-rollout condition
# this header always carried; external review KIMI-10 flagged the
# non-blocking state as a silent-failure risk).
#
# The FIM investigation notebooks run in a separate weekly batch job
# (`execute-fim-batch`, four shards, schedule + dispatch only — never
# on pull requests) so exploratory breakage is surfaced instead of
# rotting silently (KIMI-10 remainder). Excluded from all CI execution
# BY DESIGN: NB14 and NB39 read `SCPN_IBM_TOKEN` and submit live
# SamplerV2 jobs (quantum-second spend requires per-submit owner
# approval — CI must never trigger it); NB15, NB19, NB22, and NB30 read
# intentionally absent external clinical datasets
# (`<external-dataset:...>` placeholders — not distributable with the
# repository). The batch kernels run with the notebook directory as
# cwd, so a `notebooks/results` symlink makes the committed relative
# `results/...` artefact reads resolve.
#
# Schedule: core weekly Monday 06:00 UTC, FIM batch weekly Monday
# 07:00 UTC, plus on-demand dispatch. A failed scheduled job opens an
# issue via `gh issue create` (first-party token, no third-party
# action).
name: Notebook CI

on:
  pull_request:
    branches: [main]
    paths:
      - "notebooks/*.ipynb"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/notebooks.yml"
  schedule:
    - cron: '0 6 * * 1'
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  execute:
    if: github.event_name != 'schedule' || github.event.schedule == '0 6 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install project + notebook dependencies
        run: |
          pip install --no-deps -e oscillatools/
          pip install -e ".[dev,viz,ibm,tensor,mitigation,opensys,pennylane]"
          pip install nbmake
      - name: Execute core tutorial notebooks (01..13)
        run: |
          pytest \
            --nbmake \
            --nbmake-timeout=600 \
            --nbmake-kernel=python3 \
            notebooks/01_kuramoto_xy_dynamics.ipynb \
            notebooks/02_vqe_ground_state.ipynb \
            notebooks/03_error_mitigation.ipynb \
            notebooks/04_upde_16_layer.ipynb \
            notebooks/05_crypto_and_entanglement.ipynb \
            notebooks/06_pec_error_cancellation.ipynb \
            notebooks/07_quantum_advantage_scaling.ipynb \
            notebooks/08_identity_continuity.ipynb \
            notebooks/09_iter_disruption.ipynb \
            notebooks/10_qsnn_training.ipynb \
            notebooks/11_surface_code_budget.ipynb \
            notebooks/12_trapped_ion_comparison.ipynb \
            notebooks/13_cross_repo_bridges.ipynb
      - name: Open an issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Scheduled Notebook CI failure: core tutorials (run ${GITHUB_RUN_ID})" \
            --body "The weekly core tutorial notebook execution failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  execute-fim-batch:
    # Weekly exploratory batch (KIMI-10 remainder): NB15..47 except the
    # live-hardware submitters NB14/NB39. Never runs on pull requests —
    # exploratory runtimes must not gate merges; scheduled failures open
    # an issue instead.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * 1')
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: fim-a
            notebooks: >-
              notebooks/16_alpha_calibration_literature.ipynb
              notebooks/17_hierarchical_n16_sync.ipynb
              notebooks/18_clinical_tda_connectivity.ipynb
              notebooks/20_fim_phase_transition_order.ipynb
              notebooks/21_scale_frustration_pathology.ipynb
          - shard: fim-b
            notebooks: >-
              notebooks/23_geometric_curvature_knm.ipynb
              notebooks/24_directed_knm_fim_n16.ipynb
              notebooks/25_fim_scaling_law.ipynb
              notebooks/26_phase_diagram_K_lambda.ipynb
              notebooks/27_fim_stability_analysis.ipynb
              notebooks/28_information_theoretic.ipynb
              notebooks/29_multiscale_sync_dynamics.ipynb
          - shard: fim-c
            notebooks: >-
              notebooks/31_fim_mbl_interaction.ipynb
              notebooks/32_chimera_states_fim.ipynb
              notebooks/33_entropy_production.ipynb
              notebooks/34_critical_slowing_down.ipynb
              notebooks/35_anaesthesia_prediction.ipynb
              notebooks/36_topology_universality.ipynb
              notebooks/37_mean_field_self_consistent.ipynb
              notebooks/38_fim_mbl_mechanism.ipynb
          - shard: fim-d
            notebooks: >-
              notebooks/40_spo_cross_validation.ipynb
              notebooks/41_stochastic_resonance_fim.ipynb
              notebooks/42_delayed_fim.ipynb
              notebooks/43_fim_critical_exponents.ipynb
              notebooks/44_fim_modulated_learning.ipynb
              notebooks/45_noise_as_purification.ipynb
              notebooks/46_metabolic_scaling_prediction.ipynb
              notebooks/47_winding_number_topological.ipynb
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install project + notebook dependencies
        run: |
          pip install --no-deps -e oscillatools/
          pip install -e ".[dev,viz,ibm,tensor,mitigation,opensys,pennylane]"
          pip install nbmake
      - name: Link committed results into the notebook kernel cwd
        run: ln -sfn "$GITHUB_WORKSPACE/results" notebooks/results
      - name: Execute FIM investigation notebooks (${{ matrix.shard }})
        run: |
          pytest \
            --nbmake \
            --nbmake-timeout=1800 \
            --nbmake-kernel=python3 \
            ${{ matrix.notebooks }}
      - name: Open an issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Scheduled Notebook CI failure: FIM batch ${{ matrix.shard }} (run ${GITHUB_RUN_ID})" \
            --body "The weekly FIM notebook batch shard ${{ matrix.shard }} failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
