# SCPN Quantum Control — read-only GitHub Actions history audit
name: Actions History Audit

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:10 UTC, after scheduled link-check and trailer audits.
    - cron: '10 6 * * 1'

permissions:
  actions: read
  contents: read

jobs:
  classify-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Collect workflow history
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh run list
          --repo "${{ github.repository }}"
          --limit 500
          --json databaseId,conclusion,status,workflowName,headSha,headBranch,createdAt,event
          > actions-history.json
      - name: Classify workflow history
        continue-on-error: true
        run: >-
          python tools/audit_github_actions_history.py
          --input actions-history.json
          --json
          > actions-history-audit.json
      - name: Upload audit artefact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: actions-history-audit
          path: |
            actions-history.json
            actions-history-audit.json
          retention-days: 30
