      # Repo-wide strict gate: every src/ module must pass mypy --strict (the
      # explicit list above is a subset kept for targeted failure attribution).
      - run: mypy --strict src/scpn_quantum_control/
      - run: mypy

  wheel-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: python -m build
      - name: Install from wheel
        # oscillatools is an unpublished local sibling dependency, so resolve the
        # built scpn wheel without reaching PyPI for it; the smoke step below
        # supplies oscillatools from source on the import path.
        run: pip install --no-deps dist/*.whl
      - name: Smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}/oscillatools/src
        run: |
          python -c "import scpn_quantum_control; print(scpn_quantum_control.__version__)"
          python -c "from scpn_quantum_control.crypto import spectral_fingerprint; print('OK')"
          python -c "from scpn_quantum_control import knm_to_ansatz; print('OK')"

  install-smoke:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/oscillatools/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install pinned CI dependency surface
        run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - name: Import installed package and optional bridges
        run: |
          python -c "import scpn_quantum_control; print(scpn_quantum_control.__version__)"
          python -c "from scpn_quantum_control.hardware.backends import discover_backends; print(discover_backends())"
          python -c "from scpn_quantum_control.analysis import DLAParityWitness; print(DLAParityWitness.__name__)"

  differentiable-parity:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/oscillatools/src:${{ github.workspace }}
      RUNNER_ENVIRONMENT: github-hosted
      RUNNER_LABELS: ubuntu-latest,linux
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install pinned CI dependency surface
        run: |
          python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
          python -m pip install --no-deps -e .
      - name: Build CPU-only differentiable framework overlay
        run: |
          # CPU wheels: jax[cpu], tensorflow-cpu, pennylane, torch.
          export SCPN_FRAMEWORK_OVERLAY="$RUNNER_TEMP/scpn-qc-framework-site-py312"
          install-differentiable-framework-overlay --overlay-path "$SCPN_FRAMEWORK_OVERLAY" --install
          echo "PYTHONPATH=$SCPN_FRAMEWORK_OVERLAY:$PYTHONPATH" >> "$GITHUB_ENV"
          install-differentiable-framework-overlay --overlay-path "$SCPN_FRAMEWORK_OVERLAY" --verify
      - name: Run differentiable parity tests
        run: >
          pytest
          tests/test_differentiable_framework_overlay.py
          tests/test_differentiable_external_comparisons.py
          tests/test_phase_qnode_framework_parity.py
          -q
      - name: Generate functional_non_isolated differentiable evidence
        run: |
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_SHA=$GITHUB_SHA"
          mkdir -p differentiable-benchmark-evidence
          python scripts/run_differentiable_benchmark_evidence.py \
            --output-dir differentiable-benchmark-evidence
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path("differentiable-benchmark-evidence/diff-qnode-ci-evidence-schema-v1.json").read_text()
          )
          external_payload = json.loads(
              Path("differentiable-benchmark-evidence/diff-qnode-external-comparison.json").read_text()
          )
          if payload["metadata"]["classification"] != "functional_non_isolated":
              raise SystemExit("GitHub-hosted benchmark evidence must remain functional_non_isolated")
          if external_payload["classification"] != "functional_non_isolated":
              raise SystemExit("External comparison evidence must remain functional_non_isolated")
          if external_payload["artifact_id"] not in payload["evidence_artifact_ids"]:
              raise SystemExit("Benchmark evidence must reference the external comparison artefact ID")
          PY
      - name: Assert non-provider benchmark boundary
        run: grep -R "No provider or QPU execution" differentiable-benchmark-evidence
      - name: Upload functional_non_isolated differentiable evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: differentiable-functional-non-isolated-evidence
          path: differentiable-benchmark-evidence/
          retention-days: 30

  # Self-hosted execution is reserved for explicit maintainer dispatch on main.
  differentiable-isolated-benchmark:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.run_isolated_benchmark == true &&
      github.ref == 'refs/heads/main'
    needs: lint
    runs-on: [self-hosted, linux, isolated-benchmark]
    permissions:
      contents: read
    timeout-minutes: 45
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/oscillatools/src:${{ github.workspace }}
      RUNNER_ENVIRONMENT: self-hosted
      RUNNER_LABELS: self-hosted,linux,isolated-benchmark
      SCPN_BENCH_CPU_AFFINITY: "0"
      SCPN_BENCH_ISOLATION_METHOD: taskset+chrt
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: refs/heads/main
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install pinned CI dependency surface
        run: |
          python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
          python -m pip install --no-deps -e .
      - name: Run isolated differentiable benchmark evidence
        run: |
          mkdir -p differentiable-isolated-benchmark-evidence
          taskset -c "$SCPN_BENCH_CPU_AFFINITY" chrt -f 1 \
            python scripts/run_differentiable_benchmark_evidence.py \
              --output-dir differentiable-isolated-benchmark-evidence \
              --cpu-affinity "$SCPN_BENCH_CPU_AFFINITY" \
              --isolation-method "$SCPN_BENCH_ISOLATION_METHOD"
          grep '"classification": "isolated_affinity"' \
            differentiable-isolated-benchmark-evidence/diff-qnode-ci-evidence-schema-v1.json
          grep '"classification": "functional_non_isolated"' \
            differentiable-isolated-benchmark-evidence/diff-qnode-external-comparison.json
      - name: Upload isolated differentiable benchmark evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: differentiable-isolated-benchmark-evidence
          path: differentiable-isolated-benchmark-evidence/
          retention-days: 30

  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: python tools/audit_serialization_surface.py
      - run: bandit -r src/ scripts/ -ll -q
      # Audit the full hash-pinned CI lock — every transitive pin the CI jobs
      # actually install — rather than the top-level dev inputs. `--no-deps`
      # because the lock is already a complete closure. The former
      # CVE-2026-4539 (pygments ≤2.19.2) exception is obsolete: the lock pins
      # pygments 2.20.0.
      - run: pip-audit -r requirements-ci-py312-linux.txt --no-deps --desc on

  rust-audit:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn_quantum_engine
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Cache cargo registry + advisory database
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/advisory-db
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('scpn_quantum_engine/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
      - name: Install cargo-audit
        env:
          CARGO_HTTP_MULTIPLEXING: "false"
        run: |
          for attempt in 1 2 3; do
            cargo install cargo-audit --locked --version 0.22.1 && exit 0
            sleep $((attempt * 10))
          done
          cargo install cargo-audit --locked --version 0.22.1
      - name: Audit Rust dependency advisories
        run: cargo audit --deny warnings
      - name: Run Rust engine tests
        run: cargo test --locked

  hardware-smoke:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/oscillatools/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
      - name: Hardware tests (simulator only)
        run: pytest tests/test_hardware_runner.py -v --tb=short -k "simulator"

  integration-optional:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/oscillatools/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
      - name: Install sc-neurocore
        run: python -m pip install --no-deps --require-hashes -r requirements-integration-sc-neurocore.txt
      - name: Run cross-repo integration tests
        run: pytest tests/test_snn_neurocore_e2e.py tests/test_cross_repo_wiring.py -v --tb=short

  studio-conformance:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/oscillatools/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install pinned CI surface, the package, and the studio federation extra
        run: |
          python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
          python -m pip install --no-deps -e .
          python -m pip install --no-deps --require-hashes -r requirements-ci-studio-platform.txt
      - name: Gate the studio federation surface against the platform contract
        run: >
          python -m pytest
          tests/test_studio_manifest.py
          tests/test_studio_evidence_bundle.py
          tests/test_studio_scorecard_bundle.py
          tests/test_studio_support_matrix_bundle.py
          tests/test_studio_recompute_kernel.py
          tests/test_studio_reference_validation.py
          tests/test_coverage_frontier.py
          tests/test_result_pack_seal.py
          tests/test_ml_dsa_seal.py
          tests/test_differentiable_transform_support_matrix_artifact.py
          tests/test_studio_xy_compile_recompute_artifact.py
          tests/test_studio_qpu_result_pack.py
          tests/test_studio_kuramoto_reference.py
          tests/test_studio_kuramoto_scenario_artifact.py
          tests/test_studio_program_ad_replay_artifact.py
          tests/test_studio_benchmark_databank_bundle.py
          -q

  studio-web:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio-web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 11.9.0
          run_install: false
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck (TS strict)
        run: pnpm typecheck
      - name: Add the WASM build target
        run: rustup target add wasm32-unknown-unknown
      - name: Build the WASM kernel (browser recompute path needs it at test time)
        working-directory: scpn_quantum_engine/studio_wasm_kernel
        run: cargo build --release --locked --target wasm32-unknown-unknown
      - name: Assert the program-AD replay crate stays WASM-portable (ST-12)
        working-directory: scpn_quantum_engine/program_ad_replay
        run: cargo build --release --locked --target wasm32-unknown-unknown
      - name: Build the program-AD WASM kernel (ST-12)
        working-directory: scpn_quantum_engine/studio_program_ad_wasm
        run: cargo build --release --locked --target wasm32-unknown-unknown
      - name: Test the program-AD WASM kernel (ST-12)
        working-directory: scpn_quantum_engine/studio_program_ad_wasm
        run: cargo test --locked
      - name: Test with enforced coverage thresholds
        run: pnpm test:coverage
      - name: Build the portal and the federation remote
        run: pnpm build
      - name: Assert the ESM remote entry carries the locked federation name
        run: |
          test -f dist/remoteEntry.js
          grep -q "scpn_quantum_control" dist/remoteEntry.js
      - name: Ship the WASM kernel into the bundle + write the deploy manifest
        working-directory: .
        run: python3 tools/build_studio_wasm_bundle.py
      - name: Assert the deploy manifest content-addresses the shipped bundle
        working-directory: .
        run: |
          test -f studio-web/dist/deploy-manifest.json
          test -f studio-web/dist/wasm/scpn_quantum_studio_wasm_kernel.wasm
          test -f studio-web/dist/wasm/scpn_quantum_studio_program_ad_wasm.wasm
          python3 - <<'EOF'
          import hashlib, json
          from pathlib import Path
          manifest = json.loads(Path("studio-web/dist/deploy-manifest.json").read_text())
          for row in manifest["artifacts"]:
              path = Path("studio-web/dist") / row["path"]
              digest = "sha256:" + hashlib.sha256(path.read_bytes()).hexdigest()
              assert digest == row["sha256"], f"digest drift: {row['path']}"
          print(f"deploy manifest verified: {len(manifest['artifacts'])} artefacts")
          EOF

  ci-gate:
    needs: [lint, test, test-extra-platforms, type-check, wheel-check, install-smoke, differentiable-parity, security, rust-audit, studio-conformance, studio-web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.test-extra-platforms.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.wheel-check.result }}" != "success" ]] || \
             [[ "${{ needs.install-smoke.result }}" != "success" ]] || \
             [[ "${{ needs['differentiable-parity'].result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.rust-audit.result }}" != "success" ]] || \
             [[ "${{ needs['studio-conformance'].result }}" != "success" ]] || \
             [[ "${{ needs['studio-web'].result }}" != "success" ]]; then
            echo "CI gate failed"
            exit 1
          fi
          echo "CI gate passed"
