# SCPN Quantum Control — Ci
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short -x -m "not slow" --ignore=tests/test_hardware_runner.py
      - name: Run tests with coverage (3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ --cov=scpn_quantum_control --cov-report=xml --cov-fail-under=95 -m "not slow" --ignore=tests/test_hardware_runner.py
      - name: Smoke-test DLA-parity validation CLI (3.12 only)
        if: matrix.python-version == '3.12'
        run: python scripts/run_dla_parity_suite.py --json > /tmp/dla_parity_result.json
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Non-blocking cross-platform probe. Runs Python 3.12 on
  # windows-latest and macos-latest so drift between platforms is
  # visible. Failures here do NOT gate main — they are tracked
  # externally (audit item A3) until a release cycle proves the
  # surface is stable, at which point these move into `test`.
  test-extra-platforms:
    needs: lint
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    env:
      PYTHONPATH: src
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests (non-slow, non-hardware)
        run: pytest tests/ -v --tb=short -m "not slow" --ignore=tests/test_hardware_runner.py

  type-check:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: python tools/check_rust_pyi_exports.py
      - run: mypy

  wheel-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install build==1.5.0
      - run: python -m build
      - name: Install from wheel
        run: pip install dist/*.whl
      - name: Smoke test
        run: |
          python -c "import scpn_quantum_control; print(scpn_quantum_control.__version__)"
          python -c "from scpn_quantum_control.crypto import spectral_fingerprint; print('OK')"
          python -c "from scpn_quantum_control import knm_to_ansatz; print('OK')"

  install-smoke:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install pinned CI dependency surface
        run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - name: Import installed package and optional bridges
        run: |
          python -c "import scpn_quantum_control; print(scpn_quantum_control.__version__)"
          python -c "from scpn_quantum_control.hardware.backends import discover_backends; print(discover_backends())"
          python -c "from scpn_quantum_control.analysis import DLAParityWitness; print(DLAParityWitness.__name__)"

  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: bandit -r src/ scripts/ -ll -q
      # CVE-2026-4539: pygments ≤2.19.2 ReDoS in AdlLexer (local-only, no fix available)
      - run: pip-audit -r requirements-dev.txt --desc on --ignore-vuln CVE-2026-4539

  rust-audit:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn_quantum_engine
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Cache cargo registry + advisory database
        uses: actions/cache@2f8e54208210a422b2efd51efaa6bd6d7ca8920f  # v3.4.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/advisory-db
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('scpn_quantum_engine/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Audit Rust dependency advisories
        run: cargo audit --deny warnings

  hardware-smoke:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements-dev.txt
      - name: Hardware tests (simulator only)
        run: pytest tests/test_hardware_runner.py -v --tb=short -k "simulator"

  integration-optional:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements-dev.txt
      - name: Install sc-neurocore
        run: pip install sc-neurocore==3.14.0
      - name: Run cross-repo integration tests
        run: pytest tests/test_arcane_neuron_e2e.py tests/test_cross_repo_wiring.py -v --tb=short

  ci-gate:
    needs: [lint, test, type-check, wheel-check, install-smoke, security, rust-audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.wheel-check.result }}" != "success" ]] || \
             [[ "${{ needs.install-smoke.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.rust-audit.result }}" != "success" ]]; then
            echo "CI gate failed"
            exit 1
          fi
          echo "CI gate passed"
