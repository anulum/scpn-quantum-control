# SCPN Quantum Control — Ci
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - name: Audit documentation surface
        run: >
          python tools/audit_documentation_surface.py
          --allowlist tools/documentation_surface_allowlist.json
          --fail-on-findings

  test:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            requirements-file: requirements-ci-py310-linux.txt
          - python-version: "3.11"
            requirements-file: requirements-ci-py311-linux.txt
          - python-version: "3.12"
            requirements-file: requirements-ci-py312-linux.txt
          - python-version: "3.13"
            requirements-file: requirements-ci-py313-linux.txt
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: python -m pip install --require-hashes -r ${{ matrix.requirements-file }}
      - name: Run tests
        run: pytest tests/ -v --tb=short -x -m "not slow and not hardware and not internal_corpus and not performance"
      - name: Audit test quality
        run: python tools/audit_test_quality.py
      - name: Run tests with coverage (3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ --cov=scpn_quantum_control --cov-report=xml --cov-fail-under=70 -m "not slow and not hardware and not internal_corpus and not performance"
      - name: Audit coverage gaps (3.12 only)
        if: matrix.python-version == '3.12'
        run: python tools/audit_coverage_gaps.py --json > coverage-gap-audit.json
      - name: Upload coverage gap audit (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-gap-audit-${{ matrix.python-version }}
          path: coverage-gap-audit.json
          retention-days: 30
      - name: Smoke-test DLA-parity validation CLI (3.12 only)
        if: matrix.python-version == '3.12'
        run: python scripts/run_dla_parity_suite.py --json > /tmp/dla_parity_result.json
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Cross-platform package smoke. The full scientific artefact and
  # documentation corpus is validated on Linux with the pinned Linux
  # lock above; this job verifies that the install/import/core-QEC
  # surface also works on macOS and Windows without pretending a
  # Linux wheel-hash lock is portable across operating systems.
  test-extra-platforms:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          sparse-checkout: |
            .github
            src
            tests
            scripts
            tools
            pyproject.toml
            README.md
            LICENSE
            requirements-ci-cross-platform-smoke.txt
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Configure Python import path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "PYTHONPATH=$GITHUB_WORKSPACE/src;$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          else
            echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements-ci-cross-platform-smoke.txt
      - name: Run cross-platform smoke tests
        run: >
          pytest
          tests/test_biological_surface_code.py
          tests/test_biological_pipeline.py
          tests/test_biological_cli.py
          tests/test_qec_properties.py
          -v --tb=short

  type-check:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: python tools/check_rust_pyi_exports.py
      - run: mypy --strict src/scpn_quantum_control/differentiable.py
      - run: mypy

  wheel-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: python -m build
      - name: Install from wheel
        run: pip install dist/*.whl
      - name: Smoke test
        run: |
          python -c "import scpn_quantum_control; print(scpn_quantum_control.__version__)"
          python -c "from scpn_quantum_control.crypto import spectral_fingerprint; print('OK')"
          python -c "from scpn_quantum_control import knm_to_ansatz; print('OK')"

  install-smoke:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install pinned CI dependency surface
        run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - name: Import installed package and optional bridges
        run: |
          python -c "import scpn_quantum_control; print(scpn_quantum_control.__version__)"
          python -c "from scpn_quantum_control.hardware.backends import discover_backends; print(discover_backends())"
          python -c "from scpn_quantum_control.analysis import DLAParityWitness; print(DLAParityWitness.__name__)"

  differentiable-parity:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
      RUNNER_ENVIRONMENT: github-hosted
      RUNNER_LABELS: ubuntu-latest,linux
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install pinned CI dependency surface
        run: |
          python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
          python -m pip install --no-deps -e .
      - name: Build CPU-only differentiable framework overlay
        run: |
          # CPU wheels: jax[cpu], tensorflow-cpu, pennylane, torch.
          export SCPN_FRAMEWORK_OVERLAY="$RUNNER_TEMP/scpn-qc-framework-site-py312"
          install-differentiable-framework-overlay --overlay-path "$SCPN_FRAMEWORK_OVERLAY" --install
          echo "PYTHONPATH=$SCPN_FRAMEWORK_OVERLAY:$PYTHONPATH" >> "$GITHUB_ENV"
          install-differentiable-framework-overlay --overlay-path "$SCPN_FRAMEWORK_OVERLAY" --verify
      - name: Run differentiable parity tests
        run: >
          pytest
          tests/test_differentiable_framework_overlay.py
          tests/test_differentiable_external_comparisons.py
          tests/test_phase_qnode_framework_parity.py
          -q
      - name: Generate functional_non_isolated differentiable evidence
        run: |
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_SHA=$GITHUB_SHA"
          mkdir -p differentiable-benchmark-evidence
          python scripts/run_differentiable_benchmark_evidence.py \
            --output-dir differentiable-benchmark-evidence
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path("differentiable-benchmark-evidence/diff-qnode-ci-evidence-schema-v1.json").read_text()
          )
          external_payload = json.loads(
              Path("differentiable-benchmark-evidence/diff-qnode-external-comparison.json").read_text()
          )
          if payload["metadata"]["classification"] != "functional_non_isolated":
              raise SystemExit("GitHub-hosted benchmark evidence must remain functional_non_isolated")
          if external_payload["classification"] != "functional_non_isolated":
              raise SystemExit("External comparison evidence must remain functional_non_isolated")
          if external_payload["artifact_id"] not in payload["evidence_artifact_ids"]:
              raise SystemExit("Benchmark evidence must reference the external comparison artefact ID")
          PY
      - name: Assert non-provider benchmark boundary
        run: grep -R "No provider or QPU execution" differentiable-benchmark-evidence
      - name: Upload functional_non_isolated differentiable evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: differentiable-functional-non-isolated-evidence
          path: differentiable-benchmark-evidence/
          retention-days: 30

  differentiable-isolated-benchmark:
    if: github.event_name == 'workflow_dispatch'
    needs: lint
    runs-on: [self-hosted, linux, isolated-benchmark]
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
      RUNNER_ENVIRONMENT: self-hosted
      RUNNER_LABELS: self-hosted,linux,isolated-benchmark
      SCPN_BENCH_CPU_AFFINITY: "0"
      SCPN_BENCH_ISOLATION_METHOD: taskset+chrt
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install pinned CI dependency surface
        run: |
          python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
          python -m pip install --no-deps -e .
      - name: Run isolated differentiable benchmark evidence
        run: |
          mkdir -p differentiable-isolated-benchmark-evidence
          taskset -c "$SCPN_BENCH_CPU_AFFINITY" chrt -f 1 \
            python scripts/run_differentiable_benchmark_evidence.py \
              --output-dir differentiable-isolated-benchmark-evidence \
              --cpu-affinity "$SCPN_BENCH_CPU_AFFINITY" \
              --isolation-method "$SCPN_BENCH_ISOLATION_METHOD"
          grep '"classification": "isolated_affinity"' \
            differentiable-isolated-benchmark-evidence/diff-qnode-ci-evidence-schema-v1.json
          grep '"classification": "functional_non_isolated"' \
            differentiable-isolated-benchmark-evidence/diff-qnode-external-comparison.json
      - name: Upload isolated differentiable benchmark evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: differentiable-isolated-benchmark-evidence
          path: differentiable-isolated-benchmark-evidence/
          retention-days: 30

  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: python tools/audit_serialization_surface.py
      - run: bandit -r src/ scripts/ -ll -q
      # CVE-2026-4539: pygments ≤2.19.2 ReDoS in AdlLexer (local-only, no fix available)
      - run: pip-audit -r requirements-dev.txt --desc on --ignore-vuln CVE-2026-4539

  rust-audit:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn_quantum_engine
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Cache cargo registry + advisory database
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809  # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/advisory-db
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('scpn_quantum_engine/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Audit Rust dependency advisories
        run: cargo audit --deny warnings

  hardware-smoke:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
      - name: Hardware tests (simulator only)
        run: pytest tests/test_hardware_runner.py -v --tb=short -k "simulator"

  integration-optional:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
      - name: Install sc-neurocore
        run: python -m pip install --no-deps --require-hashes -r requirements-integration-sc-neurocore.txt
      - name: Run cross-repo integration tests
        run: pytest tests/test_snn_neurocore_e2e.py tests/test_cross_repo_wiring.py -v --tb=short

  ci-gate:
    needs: [lint, test, test-extra-platforms, type-check, wheel-check, install-smoke, differentiable-parity, security, rust-audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.test-extra-platforms.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.wheel-check.result }}" != "success" ]] || \
             [[ "${{ needs.install-smoke.result }}" != "success" ]] || \
             [[ "${{ needs['differentiable-parity'].result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.rust-audit.result }}" != "success" ]]; then
            echo "CI gate failed"
            exit 1
          fi
          echo "CI gate passed"
