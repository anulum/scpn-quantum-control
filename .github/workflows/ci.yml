name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install ruff==0.15.6
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short -x --ignore=tests/test_hardware_runner.py
      - name: Run tests with coverage (3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ --cov=scpn_quantum_control --cov-report=xml --cov-fail-under=95 --ignore=tests/test_hardware_runner.py
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  type-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -e ".[dev]" mypy==1.19.1
      - run: mypy

  wheel-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install build
      - run: python -m build
      - name: Install from wheel
        run: pip install dist/*.whl
      - name: Smoke test
        run: |
          python -c "import scpn_quantum_control; print(scpn_quantum_control.__version__)"
          python -c "from scpn_quantum_control.crypto import spectral_fingerprint; print('OK')"
          python -c "from scpn_quantum_control import knm_to_ansatz; print('OK')"

  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install bandit==1.9.4 pip-audit
      - run: bandit -r src/ scripts/ -ll -q
      # CVE-2026-4539: pygments ≤2.19.2 ReDoS in AdlLexer (local-only, no fix available)
      - run: pip install -e ".[dev]" && pip-audit --desc on --ignore-vuln CVE-2026-4539

  hardware-smoke:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - name: Hardware tests (simulator only)
        run: pytest tests/test_hardware_runner.py -v --tb=short -k "simulator"

  integration-optional:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - name: Install sc-neurocore
        run: pip install sc-neurocore
      - name: Run cross-repo integration tests
        run: pytest tests/test_arcane_neuron_e2e.py tests/test_cross_repo_wiring.py -v --tb=short

  ci-gate:
    needs: [lint, test, type-check, wheel-check, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.wheel-check.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "CI gate failed"
            exit 1
          fi
          echo "CI gate passed"
