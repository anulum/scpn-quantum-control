# SCPN Quantum Control — Ci
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_isolated_benchmark:
        description: "Run the self-hosted isolated benchmark job on main only."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      # The differentiable promotion-language audit imports scpn_quantum_control, which
      # now imports the standalone oscillatools distribution; expose its source tree.
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/oscillatools/src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - name: Audit documentation surface
        run: >
          python tools/audit_documentation_surface.py
          --allowlist tools/documentation_surface_allowlist.json
          --fail-on-findings
      - name: Audit tracked module-size policy
        run: python tools/audit_module_size_policy.py
      - name: Type-check module-size policy audit
        run: mypy --strict tools/audit_module_size_policy.py
      - name: Audit licence readiness and canonical source headers
        run: python tools/audit_license_readiness.py
      - name: Type-check licence readiness audit
        run: mypy --strict tools/audit_license_readiness.py
      - name: Audit additive strict test-typing cohort
        run: python tools/audit_test_typing_policy.py
      - name: Type-check test-typing policy audit
        run: mypy --strict tools/audit_test_typing_policy.py
      - name: Audit differentiable promotion language
        run: python tools/check_differentiable_promotion_language.py
      - name: Ruff docstring ratchet for differentiable module hardening
        run: >-
          ruff check --select D
          src/scpn_quantum_control/differentiable_architecture_map.py
          src/scpn_quantum_control/differentiable_dependency_environment_map.py
          src/scpn_quantum_control/differentiable_baseline_scorecard.py
          src/scpn_quantum_control/differentiable_external_validation.py
          src/scpn_quantum_control/differentiable_module_hardening_audit.py
          src/scpn_quantum_control/phase/tensorflow_maintenance.py
          src/scpn_quantum_control/benchmarks/differentiable_isolated_benchmark_plan.py
          src/scpn_quantum_control/benchmarks/differentiable_hardening_gate.py
          tests/test_differentiable_external_validation.py
          tests/test_differentiable_module_hardening_audit.py
          tests/test_phase_tensorflow_maintenance.py
          tests/test_differentiable_hardening_gate.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/oscillatools/src:${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            requirements-file: requirements-ci-py311-linux.txt
          - python-version: "3.12"
            requirements-file: requirements-ci-py312-linux.txt
          - python-version: "3.13"
            requirements-file: requirements-ci-py313-linux.txt
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: python -m pip install --require-hashes -r ${{ matrix.requirements-file }}
      - name: Install Studio recompute dependency
        if: matrix.python-version != '3.11'
        run: |
          python -m pip install --no-deps --require-hashes -r requirements-ci-studio-platform.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short -x -m "not slow and not hardware and not internal_corpus and not performance"
      - name: Audit test quality
        run: python tools/audit_test_quality.py
      - name: Run tests with coverage (3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ --cov=scpn_quantum_control --cov-report=xml --cov-fail-under=90 -m "not slow and not hardware and not internal_corpus and not performance"
      - name: Audit coverage gaps (3.12 only)
        if: matrix.python-version == '3.12'
        run: python tools/audit_coverage_gaps.py --json > coverage-gap-audit.json
      - name: Upload coverage gap audit (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-gap-audit-${{ matrix.python-version }}
          path: coverage-gap-audit.json
          retention-days: 30
      - name: Smoke-test DLA-parity validation CLI (3.12 only)
        if: matrix.python-version == '3.12'
        run: python scripts/run_dla_parity_suite.py --json > /tmp/dla_parity_result.json
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Cross-platform package smoke. The full scientific artefact and
  # documentation corpus is validated on Linux with the pinned Linux
  # lock above; this job verifies that the install/import/core-QEC
  # surface also works on macOS and Windows without pretending a
  # Linux wheel-hash lock is portable across operating systems.
  test-extra-platforms:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          sparse-checkout: |
            .github
            src
            oscillatools
            tests
            scripts
            tools
            pyproject.toml
            README.md
            LICENSE
            requirements-ci-cross-platform-smoke.txt
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Configure Python import path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "PYTHONPATH=$GITHUB_WORKSPACE/src;$GITHUB_WORKSPACE/oscillatools/src;$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          else
            echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$GITHUB_WORKSPACE/oscillatools/src:$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements-ci-cross-platform-smoke.txt
      - name: Run cross-platform smoke tests
        run: >
          pytest
          tests/test_biological_surface_code.py
          tests/test_biological_pipeline.py
          tests/test_biological_cli.py
          tests/test_qec_properties.py
          -v --tb=short

  type-check:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/oscillatools/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements-ci-py312-linux.txt
      - run: python tools/check_rust_pyi_exports.py
      - run: >-
          mypy --strict
          src/scpn_quantum_control/differentiable.py
          src/scpn_quantum_control/differentiable_claim_ledger.py
          src/scpn_quantum_control/differentiable_architecture_map.py
          src/scpn_quantum_control/differentiable_dependency_environment_map.py
