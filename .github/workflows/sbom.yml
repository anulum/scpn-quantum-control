# SCPN Quantum Control — SBOM (Software Bill of Materials)
#
# Emits CycloneDX SBOMs for both the Python package graph and the
# Rust crate graph on every push to main, every PR, every release
# (`published`), and on-demand. On release, both files are attached
# to the GitHub Release as assets so consumers can audit the exact
# dependency closure that produced the wheel.
#
# Tools:
#   - `cyclonedx-py`  — Python BOM from the installed `[dev]` env.
#   - `cargo-cyclonedx` — Rust BOM from `scpn_quantum_engine/Cargo.lock`.
#
# SBOM format: CycloneDX 1.5 JSON. Consumers use `grype`, `osv-scanner`,
# or any CycloneDX-compliant scanner.
#
# Consumption posture (adjudicated 2026-07-07, QWC-2.8): this workflow is
# generation + validation only, BY DESIGN. Vulnerability consumption of the
# same dependency surface already runs blocking on every push/PR in ci.yml:
# `pip-audit` over the full hash-pinned CI lock (Python) and `cargo audit
# --deny warnings` (Rust). Re-scanning the SBOM here with grype/osv-scanner
# would duplicate that alerting against overlapping advisory databases with
# no clear ownership of the second channel. The SBOM artefact itself is the
# supply-chain transparency product for DOWNSTREAM consumers; each generated
# file is structurally validated below so a malformed BOM cannot upload
# silently.
name: SBOM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --no-deps -e oscillatools/
      - run: pip install -e ".[dev]"
      - run: pip install cyclonedx-bom
      - name: Generate Python CycloneDX SBOM
        run: |
          cyclonedx-py environment \
            --of JSON \
            --sv 1.5 \
            -o sbom-python.cdx.json
      - name: Validate the generated SBOM
        run: |
          python - <<'EOF'
          import json
          bom = json.load(open("sbom-python.cdx.json", encoding="utf-8"))
          assert bom["bomFormat"] == "CycloneDX", bom.get("bomFormat")
          assert bom["specVersion"] == "1.5", bom.get("specVersion")
          components = bom.get("components", [])
          assert len(components) > 50, f"implausibly small BOM: {len(components)} components"
          named = [c for c in components if c.get("name") == "scpn-quantum-control"]
          root = bom.get("metadata", {}).get("component", {})
          assert named or root.get("name") == "scpn-quantum-control", "package missing from BOM"
          print(f"SBOM valid: {len(components)} components")
          EOF
      - name: Upload Python SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-python
          path: sbom-python.cdx.json
          retention-days: 90
  rust-sbom:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn_quantum_engine
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # Ubuntu runners come with a recent stable rustc + cargo in
      # PATH (`rustup show` resolves to 1.80+). No separate toolchain
      # install needed for the SBOM step.
      - run: cargo install cargo-cyclonedx --locked --version 0.5.7
      - name: Generate Rust CycloneDX SBOM
        run: cargo cyclonedx --format json --spec-version 1.5
      - name: Normalise filename
        # cargo-cyclonedx 0.5.7 writes `<crate-name>.cdx.json` (dashed)
        # next to the manifest — rename so the artifact upload step
        # has a predictable path.
        run: |
          test -s scpn-quantum-engine.cdx.json
          mv scpn-quantum-engine.cdx.json ../sbom-rust.cdx.json
          test -s ../sbom-rust.cdx.json
      - name: Validate the generated SBOM
        working-directory: .
        run: |
          python3 - <<'EOF'
          import json
          bom = json.load(open("sbom-rust.cdx.json", encoding="utf-8"))
          assert bom["bomFormat"] == "CycloneDX", bom.get("bomFormat")
          assert bom["specVersion"] == "1.5", bom.get("specVersion")
          components = bom.get("components", [])
          assert len(components) > 10, f"implausibly small BOM: {len(components)} components"
          root = bom.get("metadata", {}).get("component", {})
          assert root.get("name") == "scpn-quantum-engine", "crate missing from BOM metadata"
          print(f"SBOM valid: {len(components)} components")
          EOF
      - name: Upload Rust SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-rust
          path: sbom-rust.cdx.json
          retention-days: 90
  attach-release-assets:
    if: github.event_name == 'release'
    needs: [python-sbom, rust-sbom]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Download generated SBOM artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${GITHUB_RUN_ID}" \
            --name sbom-python \
            --dir release-sbom
          gh run download "${GITHUB_RUN_ID}" \
            --name sbom-rust \
            --dir release-sbom
          test -s release-sbom/sbom-python.cdx.json
          test -s release-sbom/sbom-rust.cdx.json
      - name: Attach SBOMs to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            release-sbom/sbom-python.cdx.json \
            release-sbom/sbom-rust.cdx.json \
            --clobber
