# SCPN Quantum Control — Multi-tier Kuramoto benchmark on the fixed CI runner.
#
# Regenerates the canonical multi-language tier benchmark for every registered
# Kuramoto compute primitive per agentic-shared/BENCHMARK_STANDARD.md. The Rust
# engine is built fresh from source so every Rust tier is present (a stale
# locally-installed wheel would mark most Rust tiers unavailable). Julia is
# measured on schedule / manual dispatch — it pays a one-off JIT boot, so the
# pull_request path runs the fast rust+python subset only.
#
# Hosted-runner CPU differs from the declared workstation, so the artefact is
# evidence-only (production_claim_allowed: false): it is the reproducible
# canonical number presented side by side with the committed *.local sibling by
# tools/render_tier_benchmarks.py — it is not a published latency claim and does
# not gate the build. workflow_dispatch regenerates it on demand.

name: Kuramoto Tier Benchmark

on:
  schedule:
    - cron: '15 7 * * 1'
  workflow_dispatch:
    inputs:
      tiers:
        description: "Comma-separated tier subset to measure"
        default: "rust,julia,python"
        type: string
  pull_request:
    paths:
      - "scripts/bench_kuramoto_tiers.py"
      - "src/scpn_quantum_control/accel/tier_benchmark.py"
      - "src/scpn_quantum_control/accel/dispatcher.py"
      - "tools/render_tier_benchmarks.py"
      - ".github/workflows/benchmark-kuramoto-tiers.yml"

permissions: {}

concurrency:
  group: kuramoto-tiers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kuramoto-tiers:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Select tier subset
        id: tiers
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=rust,python" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tiers || 'rust,julia,python' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install package and dependencies
        run: |
          python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
          python -m pip install --no-deps -e .

      - name: Install the Julia tier
        if: contains(steps.tiers.outputs.value, 'julia')
        run: python -m pip install --require-hashes -r requirements-ci-julia-tier.txt

      - name: Cache the Julia depot
        if: contains(steps.tiers.outputs.value, 'julia')
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.julia
          key: ${{ runner.os }}-julia-tierbench-${{ hashFiles('src/scpn_quantum_control/accel/julia/**') }}
          restore-keys: |
            ${{ runner.os }}-julia-tierbench-

      - name: Build and install the Rust engine
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          command: build
          args: --release --features extension-module --out dist -m scpn_quantum_engine/Cargo.toml

      - name: Install the built Rust engine
        run: python -m pip install --force-reinstall --no-deps dist/scpn_quantum_engine-*.whl

      - name: Run the consolidated tier benchmark
        run: |
          python scripts/bench_kuramoto_tiers.py \
            --environment ci \
            --tiers "${{ steps.tiers.outputs.value }}" \
            --sizes 8,32,128,512 \
            --warmup 2 \
            --repeats 5 \
            --output-dir artifacts/benchmarks/tiers

      - name: Render the side-by-side comparison
        run: |
          python tools/render_tier_benchmarks.py \
            --ci artifacts/benchmarks/tiers/kuramoto_tiers.ci.json \
            --local docs/benchmarks/tiers/kuramoto_tiers.local.json \
            --output artifacts/benchmarks/tiers/tier_benchmarks_ci_preview.md

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: kuramoto-tier-benchmark
          path: artifacts/benchmarks/tiers/
          retention-days: 90
