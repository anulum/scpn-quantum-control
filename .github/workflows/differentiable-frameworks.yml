# SCPN Quantum Control — Differentiable Frameworks Workflow
name: Differentiable Frameworks

on:
  pull_request:
    paths:
      - "src/scpn_quantum_control/phase/**"
      - "src/scpn_quantum_control/compiler/mlir.py"
      - "tests/test_phase_qnode_*.py"
      - "tests/test_phase_model_training_evidence.py"
      - ".github/workflows/differentiable-frameworks.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 2"

jobs:
  parity:
    name: parity-${{ matrix.python-version }}-${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            profile: sparse
            extras: "dev"
          - python-version: "3.11"
            profile: sparse
            extras: "dev"
          - python-version: "3.12"
            profile: full
            extras: "dev"
          - python-version: "3.13"
            profile: sparse
            extras: "dev"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[${{ matrix.extras }}]"
          if [ "${{ matrix.profile }}" = "full" ]; then
            python -m pip install "jax>=0.4.30" "tensorflow-cpu>=2.16,<3.0" "pennylane>=0.40,<1.0"
            python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.2,<3.0"
          fi

      - name: Run differentiable framework parity tests
        run: |
          pytest \
            tests/test_phase_qnode_circuit.py \
            tests/test_phase_qnode_framework_parity.py \
            tests/test_phase_model_training_evidence.py \
            tests/test_phase_qnode_compiler_lowering.py \
            -m "not hardware and not performance" \
            -q

  benchmark-metadata:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install benchmark dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run affinity benchmark metadata harness
        run: |
          mkdir -p benchmark-results
          taskset -c 0 python tools/run_phase_qnode_affinity_benchmark.py \
            --repetitions 10 \
            --warmups 3 \
            --reserved-cpus 0 \
            --output benchmark-results/phase-qnode-affinity.json

      - uses: actions/upload-artifact@v4
        with:
          name: phase-qnode-affinity-benchmark
          path: benchmark-results/phase-qnode-affinity.json
