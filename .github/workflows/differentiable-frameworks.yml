# SCPN Quantum Control — Differentiable Frameworks Workflow
name: Differentiable Frameworks

on:
  pull_request:
    paths:
      - "src/scpn_quantum_control/phase/**"
      - "src/scpn_quantum_control/compiler/mlir.py"
      - "tests/test_phase_qnode_*.py"
      - "tests/test_phase_model_training_evidence.py"
      - ".github/workflows/differentiable-frameworks.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 2"

permissions:
  contents: read

jobs:
  parity:
    name: parity-${{ matrix.python-version }}-${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            profile: sparse
            requirements-file: requirements-ci-py311-linux.txt
          - python-version: "3.11"
            profile: full
            requirements-file: requirements-ci-py311-linux.txt
          - python-version: "3.12"
            profile: sparse
            requirements-file: requirements-ci-py312-linux.txt
          - python-version: "3.12"
            profile: full
            requirements-file: requirements-ci-py312-linux.txt
          - python-version: "3.13"
            profile: sparse
            requirements-file: requirements-ci-py313-linux.txt
          - python-version: "3.13"
            profile: full
            requirements-file: requirements-ci-py313-linux.txt

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r "${{ matrix.requirements-file }}"
          python -m pip install --no-deps -e .
          if [ "${{ matrix.profile }}" = "full" ]; then
            # CPU wheels: jax[cpu], tensorflow-cpu, pennylane, torch.
            export SCPN_FRAMEWORK_OVERLAY="$RUNNER_TEMP/scpn-qc-framework-site-py${{ matrix.python-version }}"
            install-differentiable-framework-overlay --overlay-path "$SCPN_FRAMEWORK_OVERLAY" --install
            echo "PYTHONPATH=$SCPN_FRAMEWORK_OVERLAY:$PYTHONPATH" >> "$GITHUB_ENV"
            install-differentiable-framework-overlay --overlay-path "$SCPN_FRAMEWORK_OVERLAY" --verify
          fi

      - name: Run differentiable framework parity tests
        run: |
          pytest \
            tests/test_phase_qnode_circuit.py \
            tests/test_phase_qnode_framework_parity.py \
            tests/test_phase_model_training_evidence.py \
            tests/test_phase_qnode_compiler_lowering.py \
            -m "not hardware and not performance" \
            -q

      - name: Run module-specific test audit
        run: python tools/audit_test_quality.py

  optional-gpu-contract:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
          python -m pip install --no-deps -e .

      - name: Run optional GPU contract tests
        run: |
          pytest \
            tests/test_gpu_batch_vqe.py \
            tests/test_gpu_batch_vqe_contracts.py \
            -m "not hardware and not performance" \
            -q

      - name: Write optional GPU contract evidence
        run: |
          mkdir -p benchmark-results
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "artifact_id": "diff-optional-gpu-contract-${{ github.run_id }}",
              "classification": "functional_non_isolated",
              "lane": "optional-gpu-contract",
              "tests": [
                  "tests/test_gpu_batch_vqe.py",
                  "tests/test_gpu_batch_vqe_contracts.py",
              ],
              "claim_boundary": (
                  "Optional GPU contract lane verifies fail-closed GPU request "
                  "semantics on a GitHub-hosted runner; it is not live GPU, "
                  "provider, QPU, or production-performance evidence."
              ),
          }
          Path("benchmark-results/optional-gpu-contract.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          PY

      - name: Upload optional GPU contract evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: differentiable-optional-gpu-contract
          path: benchmark-results/optional-gpu-contract.json
          retention-days: 30

  benchmark-metadata:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --require-hashes -r requirements-ci-py312-linux.txt
          python -m pip install --no-deps -e .

      - name: Run affinity benchmark metadata harness
        run: |
          mkdir -p benchmark-results
          taskset -c 0 python tools/run_phase_qnode_affinity_benchmark.py \
            --repetitions 10 \
            --warmups 3 \
            --reserved-cpus 0 \
            --output benchmark-results/phase-qnode-affinity.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("benchmark-results/phase-qnode-affinity.json").read_text())
          if payload["evidence_label"] != "functional_non_isolated":
              raise SystemExit("GitHub-hosted framework benchmark must remain functional_non_isolated")
          PY

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: phase-qnode-affinity-benchmark
          path: benchmark-results/phase-qnode-affinity.json
