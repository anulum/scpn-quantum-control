# SCPN Quantum Control — Mutation testing (mutmut) weekly
#
# Runs the full `mutmut run` on the targets listed in
# `pyproject.toml [tool.mutmut]`. Non-blocking until three
# consecutive weekly runs complete without a surprise semantic
# survivor. Outcome categories explained in
# `docs/mutation_testing.md`.
name: Mutation Testing

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutmut:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install project + mutmut
        run: |
          pip install -e ".[dev]"
          pip install 'mutmut<3'
      - name: Point the runner script at the CI python
        run: |
          echo "VENV_PY=$(which python)" >> "$GITHUB_ENV"
      - name: Run mutmut baseline
        run: |
          # The config lives in `pyproject.toml [tool.mutmut]`; invoke
          # the runner script directly so mutmut gets a single-word
          # command (see docs/mutation_testing.md for the 2.5 quirk).
          mutmut run --paths-to-mutate src/scpn_quantum_control/analysis/koopman.py \
                     --tests-dir tests/ \
                     --runner=./tools/mutmut_runner.sh || true
          mutmut results | tee mutmut-results.txt
      - name: Summarise
        if: always()
        run: |
          {
            echo "## Mutation testing — weekly run"
            echo
            echo '```'
            head -80 mutmut-results.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload mutmut cache and results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mutmut-results
          path: |
            .mutmut-cache
            mutmut-results.txt
          retention-days: 365
