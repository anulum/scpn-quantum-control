# SCPN Quantum Control — Docker
name: Docker

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - ".dockerignore"
      - ".pre-commit-config.yaml"
      - ".github/workflows/docker.yml"
      - "Dockerfile"
      - "pyproject.toml"
      - "requirements*.txt"
      - "src/**"
      - "tests/**"
      - "tools/**"
      - "scripts/**"
      - "docs/**"
      - "paper/**"
      - "examples/**"
      - "notebooks/**"
      - "results/**"
      - "data/**"
      - "figures/**"
  workflow_dispatch:

jobs:
  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Build Docker image
        run: docker build -t scpn-quantum-control:test .

      - name: Run tests in Docker
        run: docker run --rm scpn-quantum-control:test

      - name: Verify import
        run: docker run --rm scpn-quantum-control:test python -c "import scpn_quantum_control; print(f'v{scpn_quantum_control.__version__}')"
