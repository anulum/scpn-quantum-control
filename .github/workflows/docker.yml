# scpn-quantum-control — Docker
name: Docker

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "src/**"
  workflow_dispatch:

jobs:
  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Build Docker image
        run: docker build -t scpn-quantum-control:test .

      - name: Run tests in Docker
        run: docker run --rm scpn-quantum-control:test

      - name: Verify import
        run: docker run --rm scpn-quantum-control:test python -c "import scpn_quantum_control; print(f'v{scpn_quantum_control.__version__}')"
