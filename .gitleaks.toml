# scpn-quantum-control — Gitleaks Allowlist

[allowlist]
description = "Allow Paper 0 validation-spec identifiers stored in JSON key fields."
condition = "AND"
paths = [
  '''paper/gotm_scpn_master_publications/gotm-scpn_paper-00_the_foundational_framework/source_validation_artifacts/paper0_.*_validation_specs_[0-9]{4}-[0-9]{2}-[0-9]{2}\.json''',
]
regexes = [
  '''"key":\s*"[A-Za-z0-9_.-]+\.[A-Za-z0-9_.-]+"''',
]
