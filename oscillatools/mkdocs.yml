# oscillatools — Mkdocs
site_name: oscillatools
site_url: https://anulum.github.io/oscillatools
site_description: A differentiable, control-oriented toolkit for coupled-phase-oscillator (Kuramoto) dynamics
site_author: Miroslav Šotek

repo_url: https://github.com/anulum/scpn-quantum-control
repo_name: anulum/scpn-quantum-control
edit_uri: edit/main/oscillatools/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Handbook: handbook.md
  - Capability Snapshot: capabilities.md
  - Gradient Coverage Matrix: gradient_coverage_matrix.md
  - Example Gallery: gallery.md
  - Benchmarks:
      - Multi-language Tier Benchmark: tier_benchmarks.md
      - Competitive Benchmark: competitive_benchmark.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - tables
  - attr_list

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
