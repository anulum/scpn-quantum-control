# scpn-quantum-control — Project Configuration

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "scpn-quantum-control"
version = "0.9.3"
description = "NISQ quantum simulation of coupled Kuramoto oscillator networks via XY Hamiltonian mapping"
readme = "README.md"
license = "AGPL-3.0-or-later"
requires-python = ">=3.10"
authors = [
    { name = "Miroslav Sotek", email = "protoscience@anulum.li" },
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Physics",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
keywords = [
    "quantum computing",
    "kuramoto",
    "spiking neural networks",
    "plasma control",
    "scpn",
    "qiskit",
]
dependencies = [
    "qiskit>=1.0.0,<2.0",  # Qiskit >=2.2 has PauliEvolutionGate bug (GH #15476)
    "qiskit-aer>=0.14.0,<1.0",
    "numpy>=1.24,<3.0",
    "scipy>=1.10,<2.0",
    "networkx>=3.0,<4.0",
]

[project.optional-dependencies]
viz = ["matplotlib>=3.5,<4.0"]
gpu = ["cupy-cuda12x>=13.0"]
jax = ["jax[cuda12]>=0.4.30"]
rust = ["scpn-quantum-engine>=0.2.0"]
dev = ["pytest>=7.0,<9.0", "pytest-cov>=4.0,<8.0", "ruff>=0.4,<1.0", "hypothesis>=6.0,<7.0", "pre-commit>=3.0,<5.0", "mypy>=1.0,<2.0", "build>=1.0,<2.0"]
docs = ["mkdocs>=1.6,<2.0", "mkdocs-material>=9.0,<10.0", "pymdown-extensions>=10.0,<11.0", "mkdocstrings[python]>=0.24,<1.0"]
ibm = ["qiskit-ibm-runtime>=0.20.0,<1.0"]
all = ["scpn-quantum-control[viz,gpu,ibm,rust]"]

[project.urls]
Homepage = "https://github.com/anulum/scpn-quantum-control"
Repository = "https://github.com/anulum/scpn-quantum-control"
Issues = "https://github.com/anulum/scpn-quantum-control/issues"
Changelog = "https://github.com/anulum/scpn-quantum-control/blob/main/CHANGELOG.md"
Documentation = "https://anulum.github.io/scpn-quantum-control"

[tool.hatch.build.targets.sdist]
exclude = [".github/", "dist/", "results/", "figures/", "notebooks/"]

[tool.hatch.build.targets.wheel]
packages = ["src/scpn_quantum_control"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m 'not slow and not hardware'"
markers = [
    "slow: marks tests as slow (run with '-m slow')",
    "hardware: requires IBM Quantum credentials",
]
xfail_strict = true
filterwarnings = [
    "ignore::DeprecationWarning:qiskit",
    "ignore::DeprecationWarning:stevedore",
    "ignore:COBYLA.*Invalid MAXFUN:UserWarning:scipy",
]

[tool.ruff]
target-version = "py39"
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line length handled by formatter
    "SIM108", # ternary can reduce readability for physics code
]

[tool.ruff.lint.per-file-ignores]
"notebooks/*.py" = ["E402"]  # notebooks install deps before importing them

[tool.ruff.lint.isort]
known-first-party = ["scpn_quantum_control"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
warn_unreachable = true
check_untyped_defs = true
ignore_missing_imports = false
files = [
    "src/scpn_quantum_control/",
]

[[tool.mypy.overrides]]
module = "numpy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "scipy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "networkx.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "qiskit.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "qiskit_aer.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "qiskit_ibm_runtime.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "matplotlib.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "scpn_quantum_engine"
ignore_missing_imports = true
follow_imports = "skip"

[[tool.mypy.overrides]]
module = "sc_neurocore.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "jax.*"
ignore_missing_imports = true
follow_imports = "skip"

[[tool.mypy.overrides]]
module = "jaxlib.*"
ignore_missing_imports = true
follow_imports = "skip"

[[tool.mypy.overrides]]
module = "ripser.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "cirq.*"
ignore_missing_imports = true
follow_imports = "skip"

[tool.coverage.run]
source = ["scpn_quantum_control"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__",
    "raise NotImplementedError",
]
exclude_also = ["if TYPE_CHECKING:"]
