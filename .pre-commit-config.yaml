# scpn-quantum-control — .Pre Commit Config
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies: [numpy, scipy, networkx, qiskit]
        pass_filenames: false

  - repo: local
    hooks:
      - id: check-secrets
        name: vault-pattern secret scan
        entry: python tools/check_secrets.py
        language: python
        always_run: true
        pass_filenames: false

      - id: version-consistency
        name: version consistency
        entry: python scripts/check_version_consistency.py
        language: python
        always_run: true
        pass_filenames: false

      - id: preflight
        name: preflight (lint + format + type-check)
        entry: bash -c 'ruff check src/ tests/ && ruff format --check src/ tests/ && mypy'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
