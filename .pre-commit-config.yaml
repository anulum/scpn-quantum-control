# scpn-quantum-control — .Pre Commit Config
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies: [numpy, scipy, networkx, qiskit]
        pass_filenames: false

  - repo: local
    hooks:
      - id: check-secrets
        name: vault-pattern secret scan
        entry: python tools/check_secrets.py
        language: python
        always_run: true
        pass_filenames: false

      - id: version-consistency
        name: version consistency
        entry: python scripts/check_version_consistency.py
        language: python
        always_run: true
        pass_filenames: false

      - id: internal-todo-policy
        name: canonical internal TODO policy
        entry: python tools/check_internal_todo_policy.py
        language: python
        always_run: true
        pass_filenames: false

      - id: commit-trailers
        name: authorship line + anti-slop commit-message check
        entry: python tools/check_commit_trailers.py
        language: python
        stages: [commit-msg]

      - id: preflight
        name: preflight (lint + docs + type-check)
        entry: bash -c 'ruff check src/ tests/ && ruff format --check src/ tests/ && python tools/audit_documentation_surface.py --allowlist tools/documentation_surface_allowlist.json --fail-on-findings && mypy && mypy --strict src/scpn_quantum_control/differentiable.py src/scpn_quantum_control/differentiable_claim_ledger.py src/scpn_quantum_control/differentiable_api.py src/scpn_quantum_control/benchmarks/differentiable_programming.py src/scpn_quantum_control/differentiable_external_validation.py src/scpn_quantum_control/differentiable_framework_overlay.py src/scpn_quantum_control/differentiable_module_hardening_audit.py src/scpn_quantum_control/benchmarks/differentiable_hardening_gate.py src/scpn_quantum_control/benchmarks/differentiable_evidence.py src/scpn_quantum_control/phase/differentiable_readiness.py src/scpn_quantum_control/phase/differentiable_audit.py src/scpn_quantum_control/phase/gradient_support_matrix.py src/scpn_quantum_control/phase/provider_gradient.py src/scpn_quantum_control/phase/hardware_gradient_policy.py src/scpn_quantum_control/phase/provider_gradient_audit.py src/scpn_quantum_control/phase/hardware_gradient_publication.py src/scpn_quantum_control/phase/provider_hardware_gradient_audit.py src/scpn_quantum_control/phase/hardware_gradient_campaign.py src/scpn_quantum_control/phase/gradient_backend.py src/scpn_quantum_control/phase/gradient_tape.py src/scpn_quantum_control/phase/natural_gradient.py src/scpn_quantum_control/phase/gradient_descent.py src/scpn_quantum_control/phase/qnode_affinity_benchmark.py src/scpn_quantum_control/phase/qnode_tape.py src/scpn_quantum_control/phase/qnode_provider_transforms.py src/scpn_quantum_control/phase/qnode_transforms.py src/scpn_quantum_control/phase/qnode_vector_transforms.py src/scpn_quantum_control/phase/qnode_framework_parity.py src/scpn_quantum_control/phase/qnode_circuit.py src/scpn_quantum_control/phase/pennylane_bridge.py src/scpn_quantum_control/phase/jax_bridge.py src/scpn_quantum_control/phase/torch_bridge.py src/scpn_quantum_control/phase/tensorflow_bridge.py src/scpn_quantum_control/phase/qiskit_bridge.py src/scpn_quantum_control/phase/qnn_framework_bridge_matrix.py src/scpn_quantum_control/phase/transform_nesting.py src/scpn_quantum_control/benchmarks/differentiable_external_comparison.py src/scpn_quantum_control/phase/xy_compiler.py src/scpn_quantum_control/phase/pennylane_import.py src/scpn_quantum_control/phase/qnn_optimizer_benchmark.py src/scpn_quantum_control/phase/qnn_training.py src/scpn_quantum_control/phase/qnn_conformance.py src/scpn_quantum_control/phase/qnn_finite_shot.py src/scpn_quantum_control/phase/qnn_convergence.py src/scpn_quantum_control/phase/qnn_loss_landscape.py src/scpn_quantum_control/phase/qgnn.py src/scpn_quantum_control/phase/qnn_framework_agreement.py src/scpn_quantum_control/phase/model_training_evidence.py'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
