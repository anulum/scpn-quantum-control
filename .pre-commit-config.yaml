repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [numpy, scipy, networkx, qiskit]
        pass_filenames: false

  - repo: local
    hooks:
      - id: version-consistency
        name: version consistency
        entry: python scripts/check_version_consistency.py
        language: python
        always_run: true
        pass_filenames: false

      - id: preflight
        name: preflight (full CI mirror)
        entry: python tools/preflight.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
