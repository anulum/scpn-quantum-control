# scpn-quantum-control — .Pre Commit Config
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.3.0
    hooks:
      - id: mypy
        # numpy/scipy are pinned to the project lock so the hook's stubs match
        # CI: unpinned, pre-commit installs the latest numpy whose stub uses PEP
        # 695 ``type`` syntax, which mypy rejects under python_version 3.10.
        # pydantic/pydantic-settings ship first-party types; without them the
        # hook env resolves BaseSettings to Any and strict mode rejects the
        # config module (disallow_subclassing_any / untyped validators).
        additional_dependencies:
          [numpy==2.4.6, scipy==1.17.1, networkx, qiskit, pydantic, pydantic-settings]
        pass_filenames: false

  - repo: local
    hooks:
      - id: check-secrets
        name: vault-pattern secret scan
        entry: python tools/check_secrets.py
        language: python
        always_run: true
        pass_filenames: false

      - id: version-consistency
        name: version consistency
        entry: python scripts/check_version_consistency.py
        language: python
        always_run: true
        pass_filenames: false

      - id: internal-todo-policy
        name: canonical internal TODO policy
        entry: python tools/check_internal_todo_policy.py
        language: python
        always_run: true
        pass_filenames: false

      - id: main-branch-policy
        name: main-branch-only Git policy
        entry: python tools/enforce_main_branch_policy.py pre-push
        language: python
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: commit-trailers
        name: seat/authorship trailers + anti-slop commit-message check
        entry: python tools/check_commit_trailers.py
        language: python
        stages: [commit-msg]

      - id: preflight
        name: preflight (lint + docs + type-check)
        entry: bash -c 'PYTHON=${SCPN_QC_PYTHON:-.venv/bin/python}; if [ ! -x "$PYTHON" ]; then PYTHON=python; fi; "$PYTHON" tools/preflight.py --no-tests'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
